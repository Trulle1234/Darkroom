name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: photography-ysws

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: photography-ysws/package-lock.json

      - name: setup pages
        uses: actions/configure-pages@v5

      - name: install deps
        run: npm ci

      - name: build
        env:
          CUSTOM_DOMAIN: true
        run: npm run build
  
      - name: upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: photography-ysws/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
